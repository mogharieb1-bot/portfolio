<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Mohammed Gharieb - Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0a0a0a; color: #fff; line-height: 1.6; }
        
        header { text-align: center; padding: 60px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        header h1 { font-size: 3.5rem; font-weight: 700; margin-bottom: 10px; }
        header p { font-size: 1.2rem; opacity: 0.9; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        .totals { text-align: center; background: #1a1a1a; padding: 25px; border-radius: 15px; margin-bottom: 40px; border: 2px solid #667eea; }
        .totals span { font-size: 1.5rem; margin: 0 20px; font-weight: 600; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        
        .media-item { background: #1a1a1a; border-radius: 20px; overflow: hidden; transition: transform 0.3s, box-shadow 0.3s; border: 1px solid #333; }
        .media-item:hover { transform: translateY(-10px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3); }
        .media-item img, .media-item video { width: 100%; height: 280px; object-fit: cover; display: block; }
        
        .reactions { display: flex; justify-content: space-around; padding: 15px; background: #222; }
        .react-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; padding: 10px 25px; border-radius: 50px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .react-btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        
        .pdf-box { text-align: center; margin: 50px 0; padding: 40px; background: #1a1a1a; border-radius: 15px; }
        .pdf-box h2 { margin-bottom: 20px; color: #667eea; }
        .pdf-box a { display: inline-block; background: #667eea; color: white; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: 600; font-size: 1.1rem; transition: 0.3s; }
        .pdf-box a:hover { background: #764ba2; transform: scale(1.05); }
        
        footer { text-align: center; padding: 40px 20px; background: #111; margin-top: 50px; }
        footer p { margin-bottom: 15px; font-size: 1.1rem; }
        footer a { color: #667eea; text-decoration: none; margin: 0 15px; font-weight: 600; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>

    <script>
        const namespace = 'mohammed-gharieb-portfolio-2025';
        
        const items = ['beuty','cats','celine','girl','horsey','jungle','makarony','moon','robot','telegram','cartoon','cute','led','lion'];

        async function loadCounts() {
            let totalLikes = 0;
            let totalLoves = 0;
            
            for(let id of items) {
                try {
                    let likeRes = await fetch(`https://api.countapi.xyz/get/${namespace}/like-${id}`);
                    let likeData = await likeRes.json();
                    document.getElementById('like-'+id).innerText = likeData.value || 0;
                    totalLikes += likeData.value || 0;

                    let loveRes = await fetch(`https://api.countapi.xyz/get/${namespace}/love-${id}`);
                    let loveData = await loveRes.json();
                    document.getElementById('love-'+id).innerText = loveData.value || 0;
                    totalLoves += loveData.value || 0;
                } catch(e) { console.log(e) }
            }
            
            document.getElementById('total-likes').innerText = totalLikes;
            document.getElementById('total-loves').innerText = totalLoves;
        }

        async function addReaction(id, type) {
            await fetch(`https://api.countapi.xyz/hit/${namespace}/${type}-${id}`);
            loadCounts();
        }

        window.onload = loadCounts;
    </script>
